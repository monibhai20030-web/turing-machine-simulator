<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fixed Multi-Tape Turing Simulator</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --primary: #38bdf8;
            --head: #ef4444;
            --cell-size: 60px;
        }

        body {
            font-family: 'Courier New', monospace;
            background: var(--bg);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .machine-wrap {
            background: var(--card);
            padding: 30px;
            border-radius: 20px;
            width: 900px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .status-panel {
            display: flex;
            justify-content: space-between;
            background: #000;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 25px;
            border: 1px solid #334155;
            font-size: 1.2rem;
            color: var(--primary);
        }

        .tape-view {
            position: relative;
            height: 100px;
            background: #111827;
            margin-bottom: 30px;
            border-radius: 8px;
            overflow: hidden;
            border: 2px solid #334155;
        }

        /* The Head - Positioned at exact horizontal center */
        .visual-head {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: var(--cell-size);
            height: var(--cell-size);
            border: 4px solid var(--head);
            z-index: 100;
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.5);
            pointer-events: none;
        }

        .tape-strip {
            display: flex;
            position: absolute;
            top: 50%;
            margin-top: calc(var(--cell-size) / -2);
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            will-change: transform;
        }

        .cell {
            min-width: var(--cell-size);
            max-width: var(--cell-size);
            height: var(--cell-size);
            border: 1px solid #334155;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            background: #1e293b;
            box-sizing: border-box;
        }

        .cell.filled { color: var(--primary); font-weight: bold; }

        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            padding: 20px;
            background: #111827;
            border-radius: 12px;
        }

        input {
            padding: 12px;
            font-size: 1rem;
            border-radius: 6px;
            border: 1px solid #334155;
            background: #0f172a;
            color: white;
            width: 200px;
        }

        button {
            padding: 12px 25px;
            font-weight: bold;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            background: var(--primary);
            color: #000;
        }

        button:disabled { opacity: 0.3; }

        .label { font-size: 0.9rem; color: #94a3b8; margin-bottom: 5px; }
    </style>
</head>
<body>

<div class="machine-wrap">
    <h1 style="text-align: center; margin-top: 0;">Multi-Tape Simulator</h1>

    <div class="status-panel">
        <span>STATE: <span id="state">IDLE</span></span>
        <span>STEPS: <span id="steps">0</span></span>
    </div>

    <div class="label">TAPE 1: INPUT</div>
    <div class="tape-view">
        <div class="visual-head"></div>
        <div id="strip1" class="tape-strip"></div>
    </div>

    <div class="label">TAPE 2: WORK</div>
    <div class="tape-view">
        <div class="visual-head"></div>
        <div id="strip2" class="tape-strip"></div>
    </div>

    <div class="controls">
        <input type="text" id="inputVal" value="11011" maxlength="12">
        <button id="btnRun" onclick="run()">START SIMULATION</button>
        <button onclick="reset()">RESET</button>
    </div>
</div>

<script>
    const TAPE_LEN = 100;
    const START_POS = 50; // The "logical" center of our array
    const BLANK = '⊔';
    
    let tape1 = Array(TAPE_LEN).fill(BLANK);
    let tape2 = Array(TAPE_LEN).fill(BLANK);
    let head1 = START_POS;
    let head2 = START_POS;
    let stepCount = 0;

    // This function calculates how much to shift the tape strip
    // so that the cell at 'headIndex' is exactly under the red head.
    function render() {
        const updateStrip = (id, data, head) => {
            const container = document.getElementById(id);
            // Re-render cells
            container.innerHTML = data.map(char => 
                `<div class="cell ${char !== BLANK ? 'filled' : ''}">${char}</div>`
            ).join('');
            
            // MATH: Move the strip so index 'head' is at center of screen.
            // Center of screen is 0px in absolute positioning if we offset correctly.
            // Since the tape-view is 900px wide, center is 450px.
            // Each cell is 60px.
            const centerPoint = 450;
            const headOffset = (head * 60) + 30; // center of the specific cell
            const finalTranslate = centerPoint - headOffset;
            
            container.style.transform = `translateX(${finalTranslate}px)`;
        };

        updateStrip('strip1', tape1, head1);
        updateStrip('strip2', tape2, head2);
        document.getElementById('steps').innerText = stepCount;
    }

    function reset() {
        tape1.fill(BLANK);
        tape2.fill(BLANK);
        head1 = START_POS;
        head2 = START_POS;
        stepCount = 0;
        document.getElementById('state').innerText = "IDLE";
        document.getElementById('btnRun').disabled = false;
        render();
    }

    async function run() {
        reset();
        const input = document.getElementById('inputVal').value || "11011";
        document.getElementById('btnRun').disabled = true;

        // LOAD: Put input onto Tape 1 starting at the head
        for(let i=0; i<input.length; i++) {
            tape1[START_POS + i] = input[i];
        }
        render();
        await sleep(1000);

        // 1. COPY PHASE
        document.getElementById('state').innerText = "PHASE: COPYING";
        for(let i=0; i<input.length; i++) {
            tape2[head2] = tape1[head1];
            stepCount++;
            render();
            await sleep(500);
            head1++;
            head2++;
            render();
            await sleep(200);
        }

        // 2. REWIND PHASE
        document.getElementById('state').innerText = "PHASE: REWINDING";
        head1 = START_POS; // Jump back
        head2--; // Move off the blank into the last char
        render();
        await sleep(1000);

        // 3. CHECK PHASE
        document.getElementById('state').innerText = "PHASE: CHECKING";
        for(let i=0; i<input.length; i++) {
            render();
            await sleep(600);
            
            if(tape1[head1] !== tape2[head2]) {
                document.getElementById('state').innerText = "REJECTED";
                return;
            }
            stepCount++;
            head1++;
            head2--;
        }

        document.getElementById('state').innerText = "ACCEPTED";
    }

    function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
    
    // Initial draw
    render();
</script>

</body>
</html>
